<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expenses">
<meta name="theme-color" content="#0f0f0f">
<title>Daily Expenses</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --muted: #888;
    --accent: #e8ff5a;
    --accent-dim: rgba(232,255,90,0.12);
    --red: #ff5a5a;
    --green: #5affb0;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LAYOUT ── */
  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-top: calc(var(--safe-top) + 16px);
    padding-bottom: calc(var(--safe-bottom) + 80px);
  }

  /* ── HEADER ── */
  .header {
    padding: 0 20px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .header-title { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
  .header-date { font-size: 22px; font-weight: 700; }
  .header-right { text-align: right; }
  .header-balance-label { font-size: 12px; color: var(--muted); }
  .header-balance { font-size: 26px; font-weight: 800; color: var(--accent); font-family: 'JetBrains Mono', monospace; }

  /* ── SUMMARY CARDS ── */
  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 20px 20px;
  }
  .summary-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid var(--border);
  }
  .summary-card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .summary-card-amount {
    font-size: 20px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .summary-card-amount.income { color: var(--green); }
  .summary-card-amount.expense { color: var(--red); }

  /* ── SECTION TITLE ── */
  .section-title {
    padding: 0 20px 10px;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .filter-btns { display: flex; gap: 6px; }
  .filter-btn {
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  /* ── TRANSACTION LIST ── */
  .tx-list { padding: 0 20px; flex: 1; }
  .tx-empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
  }
  .tx-empty .emoji { font-size: 40px; display: block; margin-bottom: 12px; }

  .tx-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.3s ease;
  }
  .tx-item:last-child { border-bottom: none; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tx-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    background: var(--surface2);
  }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .tx-amount { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; white-space: nowrap; }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }
  .tx-delete {
    background: none; border: none; color: var(--muted); cursor: pointer;
    padding: 4px 6px; border-radius: 8px; font-size: 16px;
    transition: color 0.2s;
  }
  .tx-delete:hover { color: var(--red); }

  /* ── CATEGORY CHART ── */
  .chart-section { padding: 0 20px 20px; }
  .chart-bars { display: flex; flex-direction: column; gap: 8px; }
  .chart-row { display: flex; align-items: center; gap: 10px; }
  .chart-label { font-size: 12px; color: var(--muted); width: 70px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chart-bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
  .chart-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .chart-bar-amt { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); width: 60px; text-align: right; flex-shrink: 0; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0 calc(var(--safe-bottom) + 10px);
    z-index: 100;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 4px 16px;
    border-radius: 10px;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  .nav-add-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #000;
    font-weight: 300;
    box-shadow: 0 0 30px rgba(232,255,90,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: -22px;
  }
  .nav-add-btn:active { transform: scale(0.93); }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    width: 100%; max-width: 430px;
    padding: 24px 20px calc(var(--safe-bottom) + 24px);
    animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 24px;
  }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; }

  /* type toggle */
  .type-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
  .type-btn {
    flex: 1; padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .type-btn.active.expense { background: rgba(255,90,90,0.15); color: var(--red); border-color: var(--red); }
  .type-btn.active.income { background: rgba(90,255,176,0.12); color: var(--green); border-color: var(--green); }

  /* amount display */
  .amount-display {
    background: var(--surface2);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .amount-currency { font-size: 22px; font-weight: 700; color: var(--muted); }
  .amount-input {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px; font-weight: 500; color: var(--text);
    width: 100%;
  }
  .amount-input::placeholder { color: var(--surface2); }

  .form-row { margin-bottom: 12px; }
  .form-input {
    width: 100%; padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }

  .category-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .cat-btn {
    padding: 8px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .cat-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

  .submit-btn {
    width: 100%; padding: 16px;
    background: var(--accent);
    border: none; border-radius: 14px;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 800;
    cursor: pointer; transition: transform 0.15s;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .submit-btn:active { transform: scale(0.98); }

  /* ── PAGES ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── STATS PAGE ── */
  .stats-month-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px 20px;
  }
  .month-nav-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 8px 14px;
    font-family: 'Syne', sans-serif; font-size: 18px; cursor: pointer;
  }
  .month-label { font-size: 16px; font-weight: 700; }

  .big-stat {
    background: var(--surface);
    border-radius: var(--radius);
    margin: 0 20px 16px;
    padding: 20px;
    border: 1px solid var(--border);
    text-align: center;
  }
  .big-stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .big-stat-num { font-size: 36px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: var(--red); }
  .big-stat-num.income { color: var(--green); }
  .big-stat-num.net.positive { color: var(--green); }
  .big-stat-num.net.negative { color: var(--red); }

  /* ── PWA BANNER ── */
  .pwa-banner {
    margin: 0 20px 16px;
    background: var(--accent-dim);
    border: 1px solid rgba(232,255,90,0.2);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 13px;
    color: var(--accent);
    line-height: 1.6;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .pwa-close {
    background: none; border: none; color: var(--accent);
    cursor: pointer; font-size: 16px; padding: 0; flex-shrink: 0;
    margin-top: -2px;
  }
</style>
</head>
<body>

<div class="app">

  <!-- PAGE: HOME -->
  <div class="page active" id="page-home">

    <div id="pwa-banner" class="pwa-banner">
      <span>📲</span>
      <span><strong>Add to Home Screen</strong> — tap the Share button in Safari → "Add to Home Screen" to use as an app!</span>
      <button class="pwa-close" onclick="document.getElementById('pwa-banner').style.display='none'">✕</button>
    </div>

    <div class="header">
      <div>
        <div class="header-title">Daily Expenses</div>
        <div class="header-date" id="header-date">Today</div>
      </div>
      <div class="header-right">
        <div class="header-balance-label">Net balance</div>
        <div class="header-balance" id="header-balance">₹0</div>
      </div>
    </div>

    <div class="summary">
      <div class="summary-card">
        <div class="summary-card-label">Income</div>
        <div class="summary-card-amount income" id="summary-income">₹0</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">Expenses</div>
        <div class="summary-card-amount expense" id="summary-expense">₹0</div>
      </div>
    </div>

    <div class="section-title">
      <span>Transactions</span>
      <div class="filter-btns">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('expense',this)">Exp</button>
        <button class="filter-btn" onclick="setFilter('income',this)">Inc</button>
      </div>
    </div>
    <div class="tx-list" id="tx-list"></div>
  </div>

  <!-- PAGE: STATS -->
  <div class="page" id="page-stats">
    <div class="header">
      <div>
        <div class="header-title">Analytics</div>
        <div class="header-date">Overview</div>
      </div>
    </div>

    <div class="stats-month-nav">
      <button class="month-nav-btn" onclick="changeStatsMonth(-1)">‹</button>
      <span class="month-label" id="stats-month-label"></span>
      <button class="month-nav-btn" onclick="changeStatsMonth(1)">›</button>
    </div>

    <div class="big-stat">
      <div class="big-stat-label">Total Expenses</div>
      <div class="big-stat-num" id="stats-total-expense">₹0</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 16px;">
      <div class="summary-card">
        <div class="summary-card-label">Income</div>
        <div class="summary-card-amount income" id="stats-income">₹0</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">Net</div>
        <div class="summary-card-amount" id="stats-net">₹0</div>
      </div>
    </div>

    <div class="section-title"><span>By Category</span></div>
    <div class="chart-section">
      <div class="chart-bars" id="chart-bars"></div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="showPage('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button class="nav-add-btn" onclick="openModal()">+</button>
  <button class="nav-btn" id="nav-stats" onclick="showPage('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Stats
  </button>
</div>

<!-- ADD TRANSACTION MODAL -->
<div class="modal-backdrop" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Transaction</div>

    <div class="type-toggle">
      <button class="type-btn active expense" onclick="setType('expense',this)">Expense</button>
      <button class="type-btn income" onclick="setType('income',this)">Income</button>
    </div>

    <div class="amount-display">
      <span class="amount-currency">₹</span>
      <input class="amount-input" id="amount-input" type="number" inputmode="decimal" placeholder="0.00">
    </div>

    <div class="form-row">
      <input class="form-input" id="name-input" type="text" placeholder="Description (e.g. Coffee, Salary...)">
    </div>

    <div class="category-grid" id="category-grid"></div>

    <div class="form-row">
      <input class="form-input" id="date-input" type="date">
    </div>

    <button class="submit-btn" onclick="addTransaction()">Add</button>
  </div>
</div>

<script>
// ── DATA ──
const CATEGORIES = {
  expense: [
    {id:'food',      label:'Food',      emoji:'🍔'},
    {id:'transport', label:'Transport',  emoji:'🚌'},
    {id:'shopping',  label:'Shopping',  emoji:'🛍️'},
    {id:'health',    label:'Health',    emoji:'💊'},
    {id:'bills',     label:'Bills',     emoji:'📄'},
    {id:'entertain', label:'Fun',       emoji:'🎬'},
    {id:'education', label:'Education', emoji:'📚'},
    {id:'other',     label:'Other',     emoji:'📦'},
  ],
  income: [
    {id:'salary',    label:'Salary',    emoji:'💼'},
    {id:'freelance', label:'Freelance', emoji:'💻'},
    {id:'gift',      label:'Gift',      emoji:'🎁'},
    {id:'invest',    label:'Returns',   emoji:'📈'},
    {id:'other',     label:'Other',     emoji:'📦'},
  ]
};

let transactions = JSON.parse(localStorage.getItem('exp_tx') || '[]');
let currentFilter = 'all';
let currentType = 'expense';
let currentCategory = 'food';
let statsMonth = new Date().getMonth();
let statsYear = new Date().getFullYear();

function save() { localStorage.setItem('exp_tx', JSON.stringify(transactions)); }

// ── FORMATTING ──
function fmt(n) {
  if (Math.abs(n) >= 100000) return '₹' + (n/100000).toFixed(1) + 'L';
  if (Math.abs(n) >= 1000)   return '₹' + (n/1000).toFixed(1) + 'K';
  return '₹' + Math.abs(n).toLocaleString('en-IN');
}
function fmtFull(n) { return '₹' + Math.abs(n).toLocaleString('en-IN'); }

// ── HEADER DATE ──
function updateHeaderDate() {
  const d = new Date();
  const opts = { weekday:'long', day:'numeric', month:'short' };
  document.getElementById('header-date').textContent = d.toLocaleDateString('en-IN', opts);
}
updateHeaderDate();

// ── PAGES ──
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if (p === 'stats') renderStats();
}

// ── MODAL ──
function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('amount-input').value = '';
  document.getElementById('name-input').value = '';
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('date-input').value = today;
  setType('expense', document.querySelector('.type-btn.expense'));
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCategoryGrid();
}

function renderCategoryGrid() {
  const cats = CATEGORIES[currentType];
  currentCategory = cats[0].id;
  const grid = document.getElementById('category-grid');
  grid.innerHTML = cats.map(c => `
    <button class="cat-btn ${c.id===currentCategory?'active':''}" onclick="selectCat('${c.id}',this)">
      ${c.emoji} ${c.label}
    </button>
  `).join('');
}

function selectCat(id, btn) {
  currentCategory = id;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function addTransaction() {
  const amount = parseFloat(document.getElementById('amount-input').value);
  const name = document.getElementById('name-input').value.trim();
  const date = document.getElementById('date-input').value;
  if (!amount || amount <= 0) { alert('Please enter a valid amount'); return; }
  if (!name) { alert('Please enter a description'); return; }

  const allCats = [...CATEGORIES.expense, ...CATEGORIES.income];
  const cat = allCats.find(c => c.id === currentCategory) || {emoji:'📦', label:'Other'};

  transactions.unshift({
    id: Date.now(),
    type: currentType,
    amount,
    name,
    category: currentCategory,
    emoji: cat.emoji,
    catLabel: cat.label,
    date
  });
  save();
  closeModal();
  renderHome();
}

function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  save();
  renderHome();
  renderStats();
}

// ── HOME RENDER ──
function renderHome() {
  const today = new Date().toISOString().split('T')[0];
  let totalIncome = 0, totalExpense = 0;

  transactions.forEach(t => {
    if (t.type === 'income') totalIncome += t.amount;
    else totalExpense += t.amount;
  });

  const net = totalIncome - totalExpense;
  document.getElementById('header-balance').textContent = (net < 0 ? '-' : '') + fmt(net);
  document.getElementById('header-balance').style.color = net >= 0 ? 'var(--accent)' : 'var(--red)';
  document.getElementById('summary-income').textContent = fmt(totalIncome);
  document.getElementById('summary-expense').textContent = fmt(totalExpense);

  let filtered = transactions;
  if (currentFilter === 'expense') filtered = transactions.filter(t => t.type === 'expense');
  if (currentFilter === 'income') filtered = transactions.filter(t => t.type === 'income');

  const list = document.getElementById('tx-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="tx-empty"><span class="emoji">💸</span>No transactions yet.<br>Tap + to add one!</div>`;
    return;
  }

  list.innerHTML = filtered.map(t => {
    const sign = t.type === 'income' ? '+' : '-';
    const cls = t.type;
    const dateLabel = t.date === today ? 'Today' : new Date(t.date + 'T00:00:00').toLocaleDateString('en-IN', {day:'numeric',month:'short'});
    return `
      <div class="tx-item">
        <div class="tx-icon">${t.emoji}</div>
        <div class="tx-info">
          <div class="tx-name">${t.name}</div>
          <div class="tx-meta">${t.catLabel} · ${dateLabel}</div>
        </div>
        <div class="tx-amount ${cls}">${sign}${fmtFull(t.amount)}</div>
        <button class="tx-delete" onclick="deleteTransaction(${t.id})">✕</button>
      </div>
    `;
  }).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHome();
}

// ── STATS ──
function changeStatsMonth(dir) {
  statsMonth += dir;
  if (statsMonth > 11) { statsMonth = 0; statsYear++; }
  if (statsMonth < 0)  { statsMonth = 11; statsYear--; }
  renderStats();
}

function renderStats() {
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('stats-month-label').textContent = monthNames[statsMonth] + ' ' + statsYear;

  const monthTx = transactions.filter(t => {
    const d = new Date(t.date + 'T00:00:00');
    return d.getMonth() === statsMonth && d.getFullYear() === statsYear;
  });

  const totalExpense = monthTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const totalIncome  = monthTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const net = totalIncome - totalExpense;

  document.getElementById('stats-total-expense').textContent = fmtFull(totalExpense);
  document.getElementById('stats-income').textContent = fmtFull(totalIncome);
  const netEl = document.getElementById('stats-net');
  netEl.textContent = (net < 0 ? '-' : '+') + fmtFull(Math.abs(net));
  netEl.className = 'summary-card-amount ' + (net >= 0 ? 'income' : 'expense');

  // by category
  const catMap = {};
  monthTx.filter(t=>t.type==='expense').forEach(t => {
    if (!catMap[t.catLabel]) catMap[t.catLabel] = { total: 0, emoji: t.emoji };
    catMap[t.catLabel].total += t.amount;
  });
  const cats = Object.entries(catMap).sort((a,b) => b[1].total - a[1].total);
  const max = cats.length ? cats[0][1].total : 1;

  const bars = document.getElementById('chart-bars');
  if (cats.length === 0) {
    bars.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:20px 0;text-align:center;">No expenses this month</div>`;
    return;
  }
  bars.innerHTML = cats.map(([label, data]) => `
    <div class="chart-row">
      <div class="chart-label">${data.emoji} ${label}</div>
      <div class="chart-bar-track">
        <div class="chart-bar-fill" style="width:${(data.total/max*100).toFixed(1)}%"></div>
      </div>
      <div class="chart-bar-amt">${fmt(data.total)}</div>
    </div>
  `).join('');
}

// ── INIT ──
renderCategoryGrid();
renderHome();
renderStats();
</script>
